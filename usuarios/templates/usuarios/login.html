{% extends "tienda/base.html" %}

{% block title %}
PLEIA | Iniciar sesión
{% endblock %}

{% block content %}

<div class="row justify-content-center align-items-center">

    <div class="col-lg-5 col-md-7">

        <div class="card pleia-login-card">

            <div class="card-body p-5">

                <div class="text-center mb-5">

                    <h1 class="pleia-logo mb-3">
                        PLEIA
                    </h1>

                    <h2 class="pleia-login-title">
                        Bienvenido
                    </h2>

                    <p class="pleia-login-subtitle">
                        Inicia sesión para acceder a tu cuenta y continuar con tu compra.
                    </p>

                </div>

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="pleia-btn w-100 mt-4">

                        Iniciar sesión

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
